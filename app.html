<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Пользователи бота</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #18212f;
      --muted: #66758a;
      --line: #dbe3ef;
      --accent: #16803c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .top {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .count {
      color: var(--muted);
      font-size: 14px;
    }

    .user-list {
      display: grid;
      gap: 12px;
    }

    .user-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 4px 0;
    }

    .label {
      min-width: 64px;
      color: var(--accent);
      font-weight: 700;
    }

    .value {
      word-break: break-word;
    }

    .empty {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Пользователи</h1>
      <div class="count" id="count">Загрузка...</div>
    </div>

    <div class="user-list" id="userList"></div>
  </div>

  <script>
    async function loadUsers() {
      const userList = document.getElementById("userList");
      const count = document.getElementById("count");

      try {
        const response = await fetch("./users.json?ts=" + Date.now());
        const users = await response.json();

        if (!Array.isArray(users) || users.length === 0) {
          count.textContent = "Всего: 0";
          userList.innerHTML = '<div class="empty">Пользователи пока не найдены</div>';
          return;
        }

        count.textContent = `Всего: ${users.length}`;

        userList.innerHTML = users.map(user => `
          <div class="user-card">
            <div class="row"><span class="label">Айди:</span><span class="value">${escapeHtml(String(user.id ?? ""))}</span></div>
            <div class="row"><span class="label">Юзер:</span><span class="value">${escapeHtml(user.username || "не указан")}</span></div>
            <div class="row"><span class="label">Ник:</span><span class="value">${escapeHtml(user.full_name || "не указан")}</span></div>
          </div>
        `).join("");
      } catch (error) {
        count.textContent = "Ошибка загрузки";
        userList.innerHTML = '<div class="empty">Не удалось загрузить users.json</div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    loadUsers();
  </script>
</body>
</html>
